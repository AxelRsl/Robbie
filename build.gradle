buildscript {
    ext {
        compileSdkVersion = 34
        minSdkVersion = 26
        targetSdkVersion = 31
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:7.4.2'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
    }
}

// Repositories configured in settings.gradle dependencyResolutionManagement

allprojects {
    configurations.all {
        resolutionStrategy.dependencySubstitution {
            substitute module('com.facebook.react:react-native') using module('com.facebook.react:react-android:0.71.8')
        }
        resolutionStrategy.force 'androidx.webkit:webkit:1.12.1'
    }
}

subprojects { subproject ->
    if (subproject.name == 'react-native-webview') {
        subproject.afterEvaluate {
            if (subproject.hasProperty('android')) {
                subproject.android {
                    compileOptions {
                        sourceCompatibility JavaVersion.VERSION_17
                        targetCompatibility JavaVersion.VERSION_17
                    }
                }
            }

            subproject.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                kotlinOptions {
                    jvmTarget = '17'
                }
            }
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
