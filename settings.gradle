rootProject.name = 'robbie'
include ':app'
include ':react-native-vector-icons'
project(':react-native-vector-icons').projectDir = new File(rootProject.projectDir, '../react-native-app/node_modules/react-native-vector-icons/android')

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        maven {
            credentials {
                username = "agentMaven"
                password = "agentMaven"
            }
            url "https://npm.ainirobot.com/repository/maven-public/"
        }
        maven { url 'https://jitpack.io' }
    }
}
